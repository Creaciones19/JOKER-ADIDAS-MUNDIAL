<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra 3D Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#7a1c6b 0%,#2a0224 70%,#12010f 100%);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
    perspective:2000px;
}

/* ESCENA */
.scene{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* WRAPPER */
.wrapper{
    position:relative;
    width:90%;
    max-width:1000px;
    height:55vh;
    max-height:520px;
    display:flex;
    justify-content:center;
    align-items:center;
    transform-style:preserve-3d;
}
/* Solo cambiar el fondo del “Ver detalles” en desktop */
.open-label{
    background: linear-gradient(145deg,#ff00cc,#ff4df0,#ff00cc); /* gradiente rosa/morado */
    color: white;          /* texto blanco */
    padding:6px 14px;
    border-radius:20px;
    text-align:center;
    /* todo lo demás se mantiene como estaba */
}

/* TARJETAS */
.card{
    position:absolute;
    width:clamp(160px,28vw,280px);
    height:clamp(160px,28vw,280px);

    border-radius:45px;
    padding:14px;

    background: linear-gradient(
        145deg,
        #ff00cc 0%,
        #ff4df0 50%,
        #b800ff 100%
    );

    box-shadow:
        0 25px 50px rgba(255,0,200,0.5),
        0 0 60px rgba(255,0,255,0.6),
        inset 0 0 25px rgba(255,255,255,0.2);

    transition:all 1s cubic-bezier(.22,1,.36,1);
    transform-style:preserve-3d;
    cursor:pointer;
}

.inner{
    width:100%;
    height:100%;
    border-radius:28px;
    overflow:hidden;
    background:white;
}

.inner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* POSICIONES */

.pos1{ transform:translateX(-38vw) scale(.6); opacity:.3;}
.pos2{ transform:translateX(-20vw) scale(.85); opacity:.8;}
.pos3{
    transform:translateX(0) scale(1.1) translateZ(250px);
    box-shadow:
        0 0 80px rgba(255,0,200,1),
        0 0 150px rgba(255,0,200,.7);
}
.pos4{ transform:translateX(20vw) scale(.85); opacity:.8;}
.pos5{ transform:translateX(38vw) scale(.6); opacity:.3;}
.pos6{ transform:translateX(0) scale(.9); opacity:0;}

/* ABSORCIÓN */
.absorb .card{
    transform:translateX(0) scale(.4) translateZ(0) !important;
    opacity:0;
}

/* CUBO */
.cube{
    animation:spin 10s cubic-bezier(.45,.05,.55,.95) infinite;
}

.face1{ transform:rotateY(0deg) translateZ(140px); }
.face2{ transform:rotateY(90deg) translateZ(140px); }
.face3{ transform:rotateY(180deg) translateZ(140px); }
.face4{ transform:rotateY(-90deg) translateZ(140px); }
.face5{ transform:rotateX(90deg) translateZ(140px); }
.face6{ transform:rotateX(-90deg) translateZ(140px); }

@keyframes spin{
    0%{ transform:rotateX(0deg) rotateY(0deg); }
    50%{ transform:rotateX(180deg) rotateY(180deg); }
    100%{ transform:rotateX(360deg) rotateY(360deg); }
}

/* TITULO */
h1{
    margin-top:30px;
    font-size:clamp(20px,5vw,40px);
    font-weight:300;
    color:#f5d8f3;
    text-align:center;
}

/* ================= MODAL ================= */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:.3s ease;
    z-index:9999;
    padding:20px;
}

.modal.active{
    opacity:1;
    pointer-events:all;
}

.modal-box{
    width:100%;
    max-width:650px;
    background:#121212;
    padding:clamp(15px,4vw,30px);
    border-radius:20px;
    color:white;
    text-align:center;
    transform:scale(.85);
    transition:.3s ease;
}

.modal.active .modal-box{
    transform:scale(1);
}

/* 🔥 AJUSTE SOLO AQUÍ */
.modal-box img{
    width:100%;
    height:auto;
    max-height:70vh;
    object-fit:contain;   /* YA NO SE CORTA */
    border-radius:15px;
    margin-bottom:20px;
    background:black;
}

.modal-box p{
    margin-bottom:20px;
    line-height:1.6;
    font-size:clamp(14px,3.5vw,16px);
}

.modal-box button{
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#ff00cc;
    color:white;
    cursor:pointer;
}

/* 🔥 ESTE ESPARA  QUE DIGA ABRIR*/
.inner{
    position:relative;
}
.open-label{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
     background: linear-gradient(145deg, #7a1c6b 0%, #7a1c6b 60%, #ff4df0 85%, #ff00cc 100%);
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    color:white;
    letter-spacing:.5px;
    opacity:0;
    transition:.3s ease;
    /* quitamos backdrop-filter para que el gradiente se vea */
}

.card:hover .open-label{
    opacity:1;
}

/* ================= RESPONSIVE PURO ================= */

@media (max-width:1024px){

    .wrapper{
        width:95vw;
        height:50vh;
    }

    .card{
        width:22vw;
        height:22vw;
    }

    .pos3{
        transform:translateX(0) scale(1.1) translateZ(18vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(11vw); }
    .face2{ transform:rotateY(90deg) translateZ(11vw); }
    .face3{ transform:rotateY(180deg) translateZ(11vw); }
    .face4{ transform:rotateY(-90deg) translateZ(11vw); }
    .face5{ transform:rotateX(90deg) translateZ(11vw); }
    .face6{ transform:rotateX(-90deg) translateZ(11vw); }

}

@media (max-width:768px){

    .wrapper{
        width:100vw;
        height:45vh;
    }

    .card{
        width:26vw;
        height:26vw;
    }

    .pos3{
        transform:translateX(0) scale(1.05) translateZ(20vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(13vw); }
    .face2{ transform:rotateY(90deg) translateZ(13vw); }
    .face3{ transform:rotateY(180deg) translateZ(13vw); }
    .face4{ transform:rotateY(-90deg) translateZ(13vw); }
    .face5{ transform:rotateX(90deg) translateZ(13vw); }
    .face6{ transform:rotateX(-90deg) translateZ(13vw); }

}

@media (max-width:480px){

    .wrapper{
        height:40vh;
    }

    .card{
        width:32vw;
        height:32vw;
    }

    .pos3{
        transform:translateX(0) scale(1) translateZ(22vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(15vw); }
    .face2{ transform:rotateY(90deg) translateZ(15vw); }
    .face3{ transform:rotateY(180deg) translateZ(15vw); }
    .face4{ transform:rotateY(-90deg) translateZ(15vw); }
    .face5{ transform:rotateX(90deg) translateZ(15vw); }
    .face6{ transform:rotateX(-90deg) translateZ(15vw); }

}
/* Mostrar siempre "Ver detalles" en tablets y móviles */
/* Recordatorio solo en responsive, solo cuando NO está en modo cubo */
@media (max-width:1024px){
    #wrapper:not(.cube)::before{
        content:"Toca cualquier tarjeta para ver detalle";
        position:absolute;            /* sobre las tarjetas */
        top:-30px;                     /* justo arriba del carrusel */
        left:50%;
        transform:translateX(-50%);
        font-size:12px;
        color:#ff4df0;                 /* rosa/morado */
        background:rgba(0,0,0,0.3);   /* semitransparente */
        padding:4px 10px;
        border-radius:12px;
        text-align:center;
        z-index:5;
        pointer-events:none;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        white-space:nowrap;
    }
}


</style>
</head>

<body>

<div class="scene">
    <div class="wrapper" id="wrapper">

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (5).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (1).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (3).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (4).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (8).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="chamarra1 (7).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

    </div>
</div>

<h1>JAKET ADIDAS DEL MUNDIAL</h1>

<div class="modal" id="modal">
    <div class="modal-box">
        <img id="modal-img">
        <p id="modal-text"></p>
        <button id="closeModal">Cerrar</button>
    </div>
</div>


<script>
const cards = document.querySelectorAll('.card');
const wrapper = document.getElementById('wrapper');
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const modalText = document.getElementById("modal-text");
const closeModal = document.getElementById("closeModal");

let positions = ["pos1","pos2","pos3","pos4","pos5","pos6"];
let rotations = 0;
let interval;

function startCarousel(){
    rotations = 0;
    wrapper.classList.remove("cube","absorb");
    interval = setInterval(rotateCarousel,1200);
}

function rotateCarousel(){
    positions.unshift(positions.pop());
    cards.forEach((card,i)=>{
        card.className="card "+positions[i];
    });
    rotations++;

    if(rotations===6){
        clearInterval(interval);
        setTimeout(startAbsorb,800);
    }
}

function startAbsorb(){
    wrapper.classList.add("absorb");
    setTimeout(startCube,1000);
}

function startCube(){
    wrapper.classList.remove("absorb");
    wrapper.classList.add("cube");

    const faces=["face1","face2","face3","face4","face5","face6"];

    cards.forEach((card,i)=>{
        card.className="card "+faces[i];
    });

    setTimeout(()=>{
        wrapper.classList.remove("cube");
        startCarousel();
    },10000);
}

const proyectos = [
{
titulo:"Chaqueta Adidas del Año Nuevo Chino",
descripcion:"Modelo con cremallera frontal, cuello alto, cierres tradicionales tipo palanca y un corte relajado que combina comodidad y estilo contemporáneo."
},
{
titulo:"Diseño Urbano Oversize",
descripcion:"Su silueta cuadrada y oversize fusiona la moda urbana con la inspiración cultural china, ofreciendo una presencia moderna y versátil."
},
{
titulo:"Inspiración Tang Tradicional",
descripcion:"Inspirada en la clásica chaqueta Tang, incorpora detalles orientales, cuello mandarín y elementos tradicionales reinterpretados para el streetwear actual."
},
{
titulo:"Edición de Colección",
descripcion:"Forma parte de una colección especial de Año Nuevo Chino, convirtiéndola en una prenda exclusiva y muy buscada por coleccionistas y aficionados de Adidas."
},
{
titulo:"Comodidad para Uso Diario",
descripcion:"Diseñada para brindar libertad de movimiento, ligereza y confort, permitiendo combinarla fácilmente con jeans, joggers o ropa casual."
},
{
titulo:"Fusión Cultural y Deportiva",
descripcion:"Integra la identidad deportiva de Adidas con elementos culturales asiáticos, creando una prenda única que destaca tanto en eventos especiales como en el día a día."
}
];

cards.forEach((card,index)=>{
    card.addEventListener("click",()=>{
        clearInterval(interval);
        wrapper.classList.remove("cube");

        modalImg.src = card.querySelector("img").src;

        modalText.innerHTML = `
        <strong>${proyectos[index].titulo}</strong><br><br>
        ${proyectos[index].descripcion}
        `;

        modal.classList.add("active");
    });
});

function closeModalFunction(){
    modal.classList.remove("active");
    startCarousel();
}

closeModal.addEventListener("click", closeModalFunction);

modal.addEventListener("click",(e)=>{
    if(e.target === modal){
        closeModalFunction();
    }
});

document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape"){
        closeModalFunction();
    }
});

startCarousel();

</script>

</body>
</html>
