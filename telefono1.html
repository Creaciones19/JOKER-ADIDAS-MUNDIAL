<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Phone 3D Cycle</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  overflow:hidden;
  background:radial-gradient(circle,#111,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1500px;
}

.scene{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.phone{
  width:340px;
  height:700px;
  border-radius:40px;
  background:#111;
  border:6px solid #444;
  position:relative;
  transform-style:preserve-3d;
}

.screen{
  position:absolute;
  inset:10px;
  border-radius:30px;
  background:#222;
  overflow:hidden;
}
.screen{
  position:absolute;
  inset:10px;
  border-radius:30px;
  background:#222;
  overflow:hidden;
}

/* pantalla real (contenido base) */
#screenImg{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  inset:0;
  z-index:1;
}

/* VIDRIO ROTO ENCIMA */
.crack{
  position:absolute;
  inset:0;
  background:url("rototel1.jpg") center/cover no-repeat;
  opacity:0;
  z-index:5;
  pointer-events:none;
  mix-blend-mode: screen;
  transform:scale(1.1);
}

/* FLASH */
.flash{
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  z-index:10;
  pointer-events:none;
}

/* POLVO */
.dust{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.35), transparent);
  opacity:0;
  z-index:6;
  pointer-events:none;
}
.crack{
  position:absolute;
  inset:0;
  background:url("rototel1.jpg") center/cover no-repeat;
  z-index:5;
  pointer-events:none;
  mix-blend-mode: screen;

  opacity:0;
  transform: scale(1.2);

  transition: opacity 0.6s ease, transform 0.8s ease, filter 0.8s ease;
}

/* 💥 estado inicial: roto */
.crack.active{
  opacity:1;
  animation: crackHit 0.6s ease-out forwards;
}
/* 🧲 estado cuando entran tarjetas (absorción visual) */
.crack.absorbing{
  opacity:0.3;
  transform: scale(0.95);
  filter: blur(4px);
}

/* ✨ estado final limpio (teléfono restaurado) */
.crack.clean{
  opacity:0;
  transform: scale(1);
  filter: blur(0px);
}

/* 🔥 SHAKE FUERTE DEL TELÉFONO */
@keyframes shake {
  0% { transform: translate(0,0) rotate(0deg); }
  10% { transform: translate(-6px,3px) rotate(-1deg); }
  20% { transform: translate(6px,-4px) rotate(1deg); }
  30% { transform: translate(-8px,5px); }
  40% { transform: translate(8px,-5px); }
  50% { transform: translate(-5px,2px); }
  60% { transform: translate(5px,-2px); }
  70% { transform: translate(-3px,1px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

/* 💥 FLASH MÁS BRUTAL */
.flash.active {
  animation: flashBoom 0.25s ease-out;
}

@keyframes flashBoom {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* 💔 CRACK IMPACTO REAL */
@keyframes crackHit {
  0% { transform: scale(0.6); filter: blur(6px); opacity: 0; }
  40% { transform: scale(1.4); filter: blur(0px); opacity: 1; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1.05); }
}
.flash{
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  z-index:60;
  pointer-events:none;
}

.dust{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.4), transparent);
  opacity:0;
  z-index:55;
  pointer-events:none;
}
.product{
  position:absolute;
 width:200px;
  height:270px;
  border-radius:15px;
  overflow:hidden;
  left:50%;
  top:50%;
  opacity:0;
  transform:translate(-50%,-50%) scale(.2);
  transition:1s;
  cursor:pointer;
}

.product img{
  width:100%;
  height:100%;
  object-fit:cover;
}


.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:.3s ease;
    z-index:9999;
    padding:20px;
}

.modal.active{
    opacity:1;
    pointer-events:all;
}

.modal-box{
    width:100%;
    max-width:650px;
    background:#121212;
    padding:clamp(15px,4vw,30px);
    border-radius:20px;
    color:white;
    text-align:center;
    transform:scale(.85);
    transition:.3s ease;
}

.modal.active .modal-box{
    transform:scale(1);
}

/* 🔥 AJUSTE SOLO AQUÍ */
.modal-box img{
    width:100%;
    height:auto;
    max-height:70vh;
    object-fit:contain;   /* YA NO SE CORTA */
    border-radius:15px;
    margin-bottom:20px;
    background:black;
}

.modal-box p{
    margin-bottom:20px;
    line-height:1.6;
    font-size:clamp(14px,3.5vw,16px);
}

.modal-box button{
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#ff00cc;
    color:white;
    cursor:pointer;
    
    position:relative;
}

.close-x{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
    color:white;
}
.box{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:260px;
  text-align:center;
}
.ring{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
  transform-style:preserve-3d;
}
.screen{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    bottom:10px;
    border-radius:30px;
    overflow:hidden;
    background:#222;
}

.screen-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
</style>
</head>

<body>

<div class="scene">

    <div class="phone" id="phone">

        <div class="screen">
            <img src="imtel.png" class="screen-img" id="screenImg">
        </div>

        <div class="flash" id="flash"></div>

        <div class="dust" id="dust"></div>

        <div class="crack" id="crack"></div>

    </div>

</div>
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <span class="close-x" onclick="closeModal()">✕</span>

    <img id="modalImg" src="">

    <h3 id="modalTitle"></h3>

    <p id="modalText"></p>

    <button onclick="closeModal()">Cerrar</button>

  </div>
</div>

</body>
<script>
const phone = document.getElementById("phone");
const crack = document.getElementById("crack");

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalTitle = document.getElementById("modalTitle");
const modalText = document.getElementById("modalText");

const container = document.querySelector(".scene");


let state = "intro";
let rotY = 0;
let angle = 0;
let index = 0;
let orbitTime = 0;
let returning = false;

let activeCard = null;

const data = [
  { img: "chamarra1 (1).png", title: "Chamarra México", text: "Chamarra premium impermeable" },
  { img: "chamarra1 (2).png", title: "Chamarra Invierno", text: "Ideal para frío extremo" },
  { img: "chamarra1 (3).png", title: "Chamarra Street", text: "Estilo urbano moderno" },
  { img: "chamarra1 (4).png", title: "Chamarra Ligera", text: "Perfecta para uso diario" },

  // 🔥 PRUEBA
  { img: "chamarra1 (5).png", title: "Chamarra Sport", text: "Comodidad y movimiento" },
  { img: "chamarra1 (6).png", title: "Chamarra Premium", text: "Diseño elegante y resistente" },
 
];
const radius = 260 + data.length * 35;
const products = [];

/* =========================
   CREAR TARJETAS
========================= */
data.forEach(item => {

  const p = document.createElement("div");
  p.className = "product";

  const img = document.createElement("img");
  img.src = item.img;

  p.appendChild(img);
  container.appendChild(p);

  const obj = { el: p, data: item, x: 0, y: 0 };
  products.push(obj);

  p.addEventListener("click", () => {

    activeCard = obj;

    modalImg.src = obj.data.img;
    modalTitle.textContent = obj.data.title;
    modalText.textContent = obj.data.text;

    modal.classList.add("active");

    p.style.transition = "0.3s";
    p.style.transform = "translate(-50%,-50%) scale(2)";
    p.style.zIndex = "999";
  });

});

/* =========================
   MODAL
========================= */
function closeModal() {
  modal.classList.remove("active");

  if (activeCard) {
    activeCard.el.style.transition = "0.6s";
    activeCard.el.style.transform =
      `translate(calc(-50% + ${activeCard.x}px),
                 calc(-50% + ${activeCard.y}px))
       scale(1)`;
    activeCard.el.style.zIndex = "1";
  }
}

/* =========================
   LOOP TELEFONO (INFINITO)
========================= */
function phoneLoop() {

    if (state === "intro") {

        rotY += 2;

        phone.style.transform = `rotateX(10deg) rotateY(${rotY}deg)`;

        if (rotY >= 360) {

            rotY = 0;
            state = "spawn";

            // 💥 Reiniciar el efecto de pantalla rota
            crack.classList.remove("active");
            crack.classList.remove("absorbing");
            crack.classList.remove("clean");

            void crack.offsetWidth; // fuerza reinicio de la animación

            crack.style.opacity = "1";
            crack.classList.add("active");

            // 💥 Flash + vibración
            flash.classList.add("active");
            phone.style.animation = "shake 0.6s ease";

            setTimeout(() => {

                flash.classList.remove("active");
                phone.style.animation = "";

            },300);

            // Iniciar tarjetas
            nextCard();

        }

    }

    requestAnimationFrame(phoneLoop);

}

phoneLoop();
/* =========================
   SALIDA DE TARJETAS
========================= */
function nextCard() {

  if (index >= products.length) {
    state = "orbit";
    orbitTime = Date.now();
    orbitLoop();
    return;
  }

  const p = products[index];

  // tiempo base por tarjeta
  const baseDelay = 600;

  p.el.style.opacity = "1";
  p.el.style.transition = "1s";
  p.el.style.transform = "translate(-50%,-50%) scale(1.5)";

  setTimeout(() => {

    const a = (index / products.length) * Math.PI * 2;

    // ✅ AQUÍ YA USAS RADIUS (NO 260)
    p.x = Math.cos(a) * radius;
    p.y = Math.sin(a) * radius;

    p.el.style.transform =
      `translate(calc(-50% + ${p.x}px),
                 calc(-50% + ${p.y}px))
       scale(1)`;

    index++;
    nextCard();

  }, baseDelay + Math.random() * 200);
}
/* =========================
   ORBITA
========================= */
function orbitLoop() {

  if (state !== "orbit") return;

  angle += 0.01;

  products.forEach((obj, i) => {

    const a = angle + (i / products.length) * Math.PI * 2;

    obj.x = Math.cos(a) * 260;
    obj.y = Math.sin(a) * 260;

    obj.el.style.transition = "0s";
    obj.el.style.transform =
      `translate(${obj.x}px, ${obj.y}px)
       translate(-50%,-50%) scale(1)`;
  });

  if (!returning && Date.now() - orbitTime > 8000) {
    returning = true;
    returnToPhone();
  }

  requestAnimationFrame(orbitLoop);
}

/* =========================
   REGRESO + RESET TOTAL
========================= */
function returnToPhone() {

  state = "returning";

  products.forEach((obj, i) => {

    setTimeout(() => {
      obj.el.style.transition = "0.8s";
      obj.el.style.transform = "translate(-50%,-50%) scale(0.1)";
      obj.el.style.opacity = "0";
    }, i * 80);

  });

  setTimeout(() => {

    resetCycle();

  }, 1500);
}

/* =========================
   🔥 RESET COMPLETO (CLAVE)
========================= */
function resetCycle() {

    index = 0;
    angle = 0;
    rotY = 0;
    orbitTime = 0;
    returning = false;
    state = "intro";

    // limpiar efecto de pantalla rota
    crack.classList.remove("active");
    crack.style.opacity = "0";

    // reiniciar teléfono
    phone.style.transition = "none";
    phone.style.transform = "rotateX(10deg) rotateY(0deg)";

    // reiniciar tarjetas
    products.forEach(p => {

        p.x = 0;
        p.y = 0;

        p.el.style.transition = "none";
        p.el.style.opacity = "0";
        p.el.style.transform = "translate(-50%,-50%) scale(0.2)";

    });

}
</script>
</body>
</html>
