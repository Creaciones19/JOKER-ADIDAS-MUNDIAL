<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

/* GALERÍA SUPERIOR */

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:40px;
}

.galeria-item{
background:#fff;
height:350px;
border-radius:12px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.galeria-item img{
max-width:100%;
max-height:100%;
object-fit:contain;
transition:.3s;
}


.galeria-item img:hover{
transform:scale(1.05);
}

/* PRODUCTOS */

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* TARJETAS */

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:280px;
object-fit:contain;
border-radius:10px;
cursor:pointer;
background:white;
transition:.3s;
}

.card img:hover{
transform:scale(1.05);
}

.card h3{
margin-top:12px;
margin-bottom:8px;
font-size:20px;
text-align:center;
}

.precio{
font-size:24px;
font-weight:bold;
color:#009933;
margin-bottom:10px;
text-align:center;
}

/* TALLAS */

.talla{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:15px;
}

/* CANTIDAD */

.cantidad-box{
margin-top:10px;
margin-bottom:15px;
}

.cantidad-box label{
display:block;
margin-bottom:8px;
font-weight:bold;
text-align:center;
}

.cantidad{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
}

.numero{
font-size:22px;
font-weight:bold;
min-width:40px;
text-align:center;
}

.mas{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#111;
color:white;
font-size:22px;
cursor:pointer;
transition:.3s;
}

.mas:hover{
background:#333;
}

/* TOTAL */

.total{
margin-top:12px;
font-size:18px;
font-weight:bold;
text-align:center;
color:#009933;
}

/* BOTÓN WHATSAPP */

.confirmar{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.confirmar:hover{
background:#1da851;
}

/* VISOR DE IMAGEN GRANDE */

.visor-imagen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:99999;
cursor:pointer;
padding:20px;
}

.visor-imagen img{
max-width:95%;
max-height:95%;
object-fit:contain;
border-radius:15px;
box-shadow:0 0 30px rgba(255,255,255,.3);
}


/* RESPONSIVE */

@media(max-width:768px){

.galeria{
grid-template-columns:repeat(2,1fr);
}

.productos{
grid-template-columns:repeat(2,1fr);
}

.galeria-item{
height:250px;
}

}

@media(max-width:480px){

}

.productos{

}

.galeria-item{
height:220px;

.card img{

.modal{

    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#videoGrande{

}

.cerrar{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

<script>
    
function abrirVideo(video){
    document.getElementById("modalVideo").style.display = "flex";

    const videoGrande = document.getElementById("videoGrande");

    videoGrande.src = video.querySelector("source").src;
    videoGrande.load();
    videoGrande.play();
}

function cerrarVideo(){
    const videoGrande = document.getElementById("videoGrande");

    videoGrande.pause();
    document.getElementById("modalVideo").style.display = "none";
}

function abrirImagen(img){

document.getElementById("imagenGrande").src = img.src;

document.getElementById("visorImagen").style.display = "flex";

}

function cerrarImagen(){

document.getElementById("visorImagen").style.display = "none";

}

function sumar(btn){

const card = btn.closest(".card");

const numero =
card.querySelector(".numero");

let cantidad =
parseInt(numero.textContent);

cantidad++;

numero.textContent = cantidad;

actualizarTotal(card);

}

function actualizarTotal(card){

const precioTexto =
card.querySelector(".precio").textContent;

const precio =
parseFloat(
precioTexto.replace("$","")
.replace(/,/g,"")
);

const cantidad =
parseInt(card.querySelector(".numero").textContent);

const total =
precio * cantidad;

card.querySelector(".total").textContent =
"$" + total.toLocaleString();

}

function enviarWhatsApp(btn,nombre,precio){

const card =
btn.closest(".card");

const talla =
card.querySelector(".talla").value;

const cantidad =
card.querySelector(".numero").textContent;

const total =
precio * parseInt(cantidad);

const mensaje =

`Hola, quiero realizar un pedido.

Producto: ${nombre}

Talla: ${talla}

Cantidad: ${cantidad}

Precio Unitario: $${precio}

Total: $${total.toLocaleString()}

¿Me compartes la forma de compra y la información para realizar mi pedido?`;

const telefono =
"523343340062";

const url =
`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

window.open(url,"_blank");

}

window.onload = () => {

document.querySelectorAll(".card")
.forEach(card => {

actualizarTotal(card);

});

/* ZOOM EN TODAS LAS IMÁGENES */

document.querySelectorAll("img")
.forEach(function(imagen){

imagen.addEventListener("click",function(){

abrirImagen(this);

});

});

/* CERRAR IMAGEN GRANDE */

document.getElementById("visorImagen")
.addEventListener("click",function(){

cerrarImagen();

});

};

</script>
