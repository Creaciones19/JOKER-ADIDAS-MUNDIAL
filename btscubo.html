<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra 3D Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start; /* 🔥 clave */
    align-items:center;

    padding-top:20px; /* espacio arriba */

    background:radial-gradient(circle at center,#7a1c6b 0%,#2a0224 70%,#12010f 100%);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
    perspective:2000px;
}
/* ESCENA */
.scene{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;  /* 🔥 antes estaba center */
   padding-top: 0px;    /* ajusta aquí */
}
/* WRAPPER */
.wrapper{
    position:relative;
    width:90%;
    max-width:1000px;
    height:55vh;
    max-height:520px;
    display:flex;
    justify-content:center;
    align-items:center;
    transform-style:preserve-3d;

    margin-top: -20px; /* 🔥 esto sube el cubo */
}
/* Solo cambiar el fondo del “Ver detalles” en desktop */
.open-label{
background: linear-gradient(145deg, #ff00ff, #ff99ff, #ff00ff); /* gradiente rosa/morado */
    color: white;          /* texto blanco */
    padding:6px 14px;
    border-radius:20px;
    text-align:center;
    /* todo lo demás se mantiene como estaba */
}

/* TARJETAS */
.card{
    position:absolute;
   width: clamp(140px,24vw,220px);
    height: clamp(140px,24vw,220px);

    border-radius:45px;
    padding:14px;

    background: linear-gradient(
        145deg,
        #6a0dad 0%,
        #9b59b6 50%,
        #e0b3ff 100%
    );

    box-shadow:
        0 25px 50px rgba(140,0,255,0.7),
        0 0 60px rgba(184,77,255,0.8),
        0 0 120px rgba(214,153,255,0.7),
        inset 0 0 25px rgba(255,255,255,0.2);

    transition:all 1s cubic-bezier(.22,1,.36,1);
    transform-style:preserve-3d;
    cursor:pointer;
}
.inner{
    width:100%;
    height:100%;
    border-radius:28px;
    overflow:hidden;
    background:white;
}

.inner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* POSICIONES */

.pos1{ transform:translateX(-38vw) scale(.6); opacity:.3;}
.pos2{ transform:translateX(-20vw) scale(.85); opacity:.8;}
.pos3{
    transform:translateX(0) scale(1.1) translateZ(250px);
    box-shadow:
        0 0 80px rgba(255,0,200,0.5)
        0 0 150px #d966ff,
        0 0 250px #e699ff;
}
.pos4{ transform:translateX(20vw) scale(.85); opacity:.8;}
.pos5{ transform:translateX(38vw) scale(.6); opacity:.3;}
.pos6{ transform:translateX(0) scale(.9); opacity:0;}

/* ABSORCIÓN */
.absorb .card{
    transform:translateX(0) scale(.4) translateZ(0) !important;
    opacity:0;
}

/* CUBO */
.cube{
    animation:spin 10s cubic-bezier(.45,.05,.55,.95) infinite;
}

.face1{ transform:rotateY(0deg) translateZ(140px); }
.face2{ transform:rotateY(90deg) translateZ(140px); }
.face3{ transform:rotateY(180deg) translateZ(140px); }
.face4{ transform:rotateY(-90deg) translateZ(140px); }
.face5{ transform:rotateX(90deg) translateZ(140px); }
.face6{ transform:rotateX(-90deg) translateZ(140px); }

@keyframes spin{
    0%{ transform:rotateX(0deg) rotateY(0deg); }
    50%{ transform:rotateX(180deg) rotateY(180deg); }
    100%{ transform:rotateX(360deg) rotateY(360deg); }
}

/* TITULO */
h1{
    margin: 0;
    margin-top: 20px;
    margin-bottom: 60px; /* 🔥 esto crea espacio real abajo */
    
    font-size: clamp(20px,5vw,40px);
    font-weight: 300;
    color: #b700ff;
    text-align: center;

    text-shadow:
        0 0 10px #b700ff,
        0 0 20px #b700ff,
        0 0 40px #d966ff,
        0 0 80px #e0aaff,
        0 0 120px #e0aaff;
}
/* ================= MODAL ================= */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:.3s ease;
    z-index:9999;
    padding:20px;
}

.modal.active{
    opacity:1;
    pointer-events:all;
}

.modal-box{
    width:100%;
    max-width:650px;
    background:#121212;
    padding:clamp(15px,4vw,30px);
    border-radius:20px;
    color:white;
    text-align:center;
    transform:scale(.85);
    transition:.3s ease;
}

.modal.active .modal-box{
    transform:scale(1);
}

/* 🔥 AJUSTE SOLO AQUÍ */
.modal-box img{
    width:100%;
    height:auto;
    max-height:70vh;
    object-fit:contain;   /* YA NO SE CORTA */
    border-radius:15px;
    margin-bottom:20px;
    background:black;
}

.modal-box p{
    margin-bottom:20px;
    line-height:1.6;
    font-size:clamp(14px,3.5vw,16px);
}

.modal-box button{
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#FF00FF;
    color:white;
    cursor:pointer;
}
.modal{
    position: fixed;
    inset: 0;
    z-index: 999999;
}

/* 🔥 ESTE ESPARA  QUE DIGA ABRIR*/
.inner{
    position:relative;
}
.open-label{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
   background: linear-gradient(145deg,#2a003f 0%,#5a189a 35%,#9d4edd 70%,#e0aaff 100%);
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    color:white;
    letter-spacing:.5px;
    opacity:0;
    transition:.3s ease;
    /* quitamos backdrop-filter para que el gradiente se vea */
}

.card:hover .open-label{
    opacity:1;
}

/* ================= RESPONSIVE PURO ================= */

@media (max-width:1024px){

    .wrapper{
        width:95vw;
        height:50vh;
    }

    .card{
        width:22vw;
        height:22vw;
    }

    .pos3{
        transform:translateX(0) scale(1.1) translateZ(18vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(11vw); }
    .face2{ transform:rotateY(90deg) translateZ(11vw); }
    .face3{ transform:rotateY(180deg) translateZ(11vw); }
    .face4{ transform:rotateY(-90deg) translateZ(11vw); }
    .face5{ transform:rotateX(90deg) translateZ(11vw); }
    .face6{ transform:rotateX(-90deg) translateZ(11vw); }

}

@media (max-width:768px){

    .wrapper{
        width:100vw;
        height:45vh;
    }

    .card{
        width:26vw;
        height:26vw;
    }

    .pos3{
        transform:translateX(0) scale(1.05) translateZ(20vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(13vw); }
    .face2{ transform:rotateY(90deg) translateZ(13vw); }
    .face3{ transform:rotateY(180deg) translateZ(13vw); }
    .face4{ transform:rotateY(-90deg) translateZ(13vw); }
    .face5{ transform:rotateX(90deg) translateZ(13vw); }
    .face6{ transform:rotateX(-90deg) translateZ(13vw); }

}

@media (max-width:480px){

    .wrapper{
        height:40vh;
    }

    .card{
        width:32vw;
        height:32vw;
    }

    .pos3{
        transform:translateX(0) scale(1) translateZ(22vw);
    }

    .face1{ transform:rotateY(0deg) translateZ(15vw); }
    .face2{ transform:rotateY(90deg) translateZ(15vw); }
    .face3{ transform:rotateY(180deg) translateZ(15vw); }
    .face4{ transform:rotateY(-90deg) translateZ(15vw); }
    .face5{ transform:rotateX(90deg) translateZ(15vw); }
    .face6{ transform:rotateX(-90deg) translateZ(15vw); }

}
/* Mostrar siempre "Ver detalles" en tablets y móviles */
/* Recordatorio solo en responsive, solo cuando NO está en modo cubo */
@media (max-width:1024px){
    #wrapper:not(.cube)::before{
        content:"Toca cualquier tarjeta para ver detalle";
        position:absolute;            /* sobre las tarjetas */
        top:-30px;                     /* justo arriba del carrusel */
        left:50%;
        transform:translateX(-50%);
        font-size:12px;
        color:#d36bff;                 /* rosa/morado */
        background:rgba(0,0,0,0.3);   /* semitransparente */
        padding:4px 10px;
        border-radius:12px;
        text-align:center;
        z-index:5;
        pointer-events:none;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        white-space:nowrap;
    }
}
/* ================= FONDO BTS ================= */
/* ================= FONDO BTS ================= */

.bg-bts{
    position:fixed;
    inset:0;
    z-index:0; /* TODO atrás */
    overflow:hidden;
    opacity:1;
}

/* video fondo */
#bgVideo{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(.5) contrast(1.2);
}

/* ================= BTS ESCENA ================= */

.bts-line{
    position:absolute;
    top:55%; /* antes 50% */
    left:50%;
    transform:translate(-50%,-55%);
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:10px;
    padding-bottom:30px;
    transition:1.5s ease;
}

/* estado final abajo */
.bg-bts.bottom .bts-line{
    top:auto;
    bottom:0;
    transform:translateX(-50%);
}

/* miembros */
.member{
    width:clamp(115px,14vw,190px);
    animation:dance 1.3s infinite ease-in-out;
    transform-origin:bottom center;
    filter:drop-shadow(0 15px 20px rgba(0,0,0,.8));
}

/* delay para efecto grupo */
.m1{animation-delay:0s;}
.m2{animation-delay:.1s;}
.m3{animation-delay:.2s;}
.m4{animation-delay:.3s;}
.m5{animation-delay:.4s;}
.m6{animation-delay:.5s;}
.m7{animation-delay:.6s;}

@keyframes dance{
    0%{
        transform:translateY(0) rotate(-1deg) scale(1);
    }
    25%{
        transform:translateY(-10px) rotate(1deg) scale(1.02);
    }
    50%{
        transform:translateY(-22px) rotate(-2deg) scale(1.01);
    }
    75%{
        transform:translateY(-8px) rotate(1deg) scale(1.02);
    }
    100%{
        transform:translateY(0) rotate(-1deg) scale(1);
    }
}
/* ================= CAPAS FRONT ================= */

.scene, .wrapper, h1{
    position:relative;
    z-index:2;
}
.bg-bts.bottom .member{
    animation-play-state: paused;
    opacity: 0.8;
}
.wrapper{
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 1s ease, transform 1s ease;
}

.wrapper.show{
    opacity: 1;
    transform: scale(1);
}

body{
    isolation: isolate;
}
</style>
</head>

<body>

<!-- INTRO BTS -->
<div class="bg-bts">

    <video autoplay muted loop id="bgVideo">
        <source src="videobts.mp4" type="video/mp4">
    </video>

    <div class="bts-line">
        <img src="bts (1).png" class="member m1">
        <img src="bts (2).png" class="member m2">
        <img src="bts (3).png" class="member m3">
        <img src="bts (4).png" class="member m4">
        <img src="bts (5).png" class="member m5">
        <img src="bts (6).png" class="member m6">
        <img src="bts (7).png" class="member m7">
    </div>

</div>

<!-- 🔥 TITULO ARRIBA DEL CUBO -->
<h1>PRODUCTOS KOREANOS</h1>

<div class="scene">
    <div class="wrapper" id="wrapper">

        <div class="card">
            <div class="inner">
                <img src="productocoreano (1).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productocoreano (2).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productocoreano (3).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productocoreano (4).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productocoreano (5).png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productoscorea1.png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

        <div class="card">
            <div class="inner">
                <img src="productocoreano2.png">
                <span class="open-label">Ver detalles</span>
            </div>
        </div>

    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <img id="modal-img">
        <p id="modal-text"></p>
        <button id="closeModal">Cerrar</button>
    </div>
</div>

<script>


const cards = document.querySelectorAll('.card');
const wrapper = document.getElementById('wrapper');
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const modalText = document.getElementById("modal-text");
const closeModal = document.getElementById("closeModal");

// =========================
// CARRUSEL + CUBO (INTACTO)
// =========================

let positions = ["pos1","pos2","pos3","pos4","pos5","pos6"];
let rotations = 0;
let interval;

function startCarousel(){
    rotations = 0;
    wrapper.classList.remove("cube","absorb");
    interval = setInterval(rotateCarousel,1200);
}

function rotateCarousel(){
    positions.unshift(positions.pop());

    cards.forEach((card,i)=>{
        card.className = "card " + positions[i];
    });

    rotations++;

    if(rotations === 6){
        clearInterval(interval);
        setTimeout(startAbsorb, 800);
    }
}

function startAbsorb(){
    wrapper.classList.add("absorb");
    setTimeout(startCube, 1000);
}

function startCube(){
    wrapper.classList.remove("absorb");
    wrapper.classList.add("cube");

    const faces = ["face1","face2","face3","face4","face5","face6"];

    cards.forEach((card,i)=>{
        card.className = "card " + faces[i];
    });

    setTimeout(()=>{
        wrapper.classList.remove("cube");
        startCarousel();
    }, 10000);
}

// =========================
// MODAL (INTACTO)
// =========================

const proyectos = [
// 1. Yakult coreano (bebida probiótica de sabores)

{
titulo:"Bebida Probiótica Coreana",
descripcion:"Elaborada con cultivos lácticos para una bebida ligera y refrescante."
},
{
titulo:"Diferentes Sabores",
descripcion:"Disponible en sabores frutales como uva, durazno, fresa y mango."
},
{
titulo:"Sabor Dulce y Suave",
descripcion:"Textura ligera con un equilibrio entre dulzor y acidez."
},
{
titulo:"Lista para Beber",
descripcion:"Presentación individual ideal para disfrutar bien fría."
},
{
titulo:"Popular en Corea",
descripcion:"Una de las bebidas lácteas favoritas del mercado coreano."
},
{
titulo:"Ideal para Cualquier Momento",
descripcion:"Perfecta para acompañar comidas o como snack refrescante."
}
];

cards.forEach((card,index)=>{
    card.addEventListener("click",()=>{
        clearInterval(interval);
        wrapper.classList.remove("cube");

        modalImg.src = card.querySelector("img").src;

        modalText.innerHTML = `
        <strong>${proyectos[index].titulo}</strong><br><br>
        ${proyectos[index].descripcion}
        `;

        modal.classList.add("active");
    });
});

function closeModalFunction(){
    modal.classList.remove("active");
    startCarousel();
}

closeModal.addEventListener("click", closeModalFunction);

modal.addEventListener("click",(e)=>{
    if(e.target === modal){
        closeModalFunction();
    }
});

document.addEventListener("keydown",(e)=>{
    if(e.key === "Escape"){
        closeModalFunction();
    }
});

// =========================
// 🔥 SECUENCIA REAL (SIN MEZCLA)
// =========================
const bg = document.querySelector(".bg-bts");

function startScene(){

    // 🔥 1. ocultar cubo al inicio
    wrapper.classList.remove("show");

    // 2. BTS en centro (ya están visibles)

    // 3. BTS bajan primero
    setTimeout(() => {
        bg.classList.add("bottom");
    }, 3000);

    // 4. CUBO aparece DESPUÉS de que bajan BTS
    setTimeout(() => {

        // mostrar cubo primero
        wrapper.classList.add("show");

        // luego arrancar animación normal
        startCarousel();

    }, 6000);
}

window.addEventListener("load", startScene);
</script>

</body>
</html>
